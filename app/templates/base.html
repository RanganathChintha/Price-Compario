<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>{% block title %}Price Compario - Smart Price Comparison Platform{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header class="header">
        <div class="header-content">
            <div class="logo">
                <a href="/">
                    <h1>🛍️ Price Compario</h1>
                    <div class="tagline">Smart Price Comparison Platform</div>
                </a>
            </div>
            <button class="theme-toggle" id="themeToggle">
                <i class="fas fa-moon"></i> Dark/Light
            </button>
        </div>
    </header>
    
    <main>
        {% block content %}{% endblock %}
    </main>
    
    <button id="compareBtn" class="btn btn-primary" style="position: fixed; bottom: 20px; right: 20px; display: none; z-index: 1000;" onclick="showComparison()">
        <i class="fas fa-chart-line"></i> Compare
    </button>
    
    <div id="compareModal" class="modal">
        <div class="modal-content">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 1rem;">
                <h2><i class="fas fa-chart-line"></i> Product Comparison</h2>
                <button onclick="closeModal()" style="background: none; border: none; font-size: 1.5rem; cursor: pointer;">&times;</button>
            </div>
            <div id="comparisonContent"></div>
        </div>
    </div>
    
    <footer class="footer">
        <p>&copy; 2024 Price Compario. All rights reserved. | Made with ❤️ for smart shoppers</p>
    </footer>
    
    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
    {% block extra_js %}{% endblock %}
</body>
</html>
