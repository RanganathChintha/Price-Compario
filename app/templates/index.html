{% extends "base.html" %}

{% block title %}Home - Price Compario{% endblock %}

{% block content %}
<div class="hero-section">
    <div class="hero-title">Find the Best Deals Across All Vendors</div>
    <div class="hero-subtitle">Compare prices from Amazon, Flipkart, Walmart and more in real-time</div>
    
    <div class="search-container">
        <div class="search-input-wrapper">
            <i class="fas fa-search search-icon"></i>
            <input type="text" 
                   id="searchInput" 
                   class="search-input" 
                   placeholder="Search for products... (e.g., iPhone, Laptop, Headphones)"
                   autocomplete="off">
            <button id="searchBtn" class="search-btn">
                <i class="fas fa-arrow-right"></i> Search
            </button>
        </div>
        <div id="suggestionsContainer" class="suggestions-container"></div>
    </div>
</div>

<div id="filtersContainer"></div>
<div id="resultsContainer"></div>
{% endblock %}
